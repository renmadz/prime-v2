# ─────────────────────────────────────────────────────────
# docker-compose.dev.yml — Local development overrides
#
# Use this on top of docker-compose.yml for local work only.
# This file MUST NOT be used in staging or production.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Overrides:
# - prime-backend / prime-frontend build against the `builder` stage of
#   their Dockerfiles (has devDependencies + full source) instead of the
#   production runtime stage, and mount local src/ for hot reload.
# - prime-postgres / prime-minio get host port mappings for local
#   inspection (pgAdmin, DBeaver, MinIO console) — not used in prod.
# ─────────────────────────────────────────────────────────

services:

  prime-postgres:
    ports:
      - "5432:5432"
    # Accessible at localhost:5432 in dev only

  # ─────────────────────────────────────────────────────────
  # prime-postgres-test — isolated test database on port 5433
  # Used by `npm run test:local` in apps/backend.
  # Credentials are fixed/public — this DB never holds real data.
  # ─────────────────────────────────────────────────────────
  prime-postgres-test:
    image: postgres:16-alpine
    container_name: prime-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_DB: primev2_test
      POSTGRES_USER: primev2_user
      POSTGRES_PASSWORD: devpassword123
    ports:
      - "5433:5432"
    networks:
      - prime-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primev2_user -d primev2_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  prime-minio:
    ports:
      - "9010:9000"   # MinIO S3 API (host 9010 — avoids conflict with other services on 9000)
      - "9011:9001"   # MinIO console UI — http://localhost:9011
    # Access the console at http://localhost:9001
    # Log in with MINIO_ACCESS_KEY / MINIO_SECRET_KEY from .env

  prime-backend:
    build:
      target: builder
    command: npx tsx watch src/server.ts
    volumes:
      - ./apps/backend/src:/app/src
      - ./apps/backend/prisma:/app/prisma
    environment:
      NODE_ENV: development
      # Presigned download URLs (attachments, exports) must be signed against
      # a host the browser can resolve — the internal "prime-minio" Docker
      # hostname used for server-to-MinIO calls isn't reachable from the host.
      # Port 9010 is the host-mapped MinIO port set above.
      MINIO_PUBLIC_ENDPOINT: localhost:9010

  prime-frontend:
    build:
      target: builder
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: ""
      API_PROXY_TARGET: http://prime-backend:3000
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/vite.config.ts:/app/vite.config.ts
    ports:
      - "5173:5173"
    healthcheck:
      # Dev runs vite on 5173, not nginx on 80 — override the base check
      # (which would otherwise report a healthy dev container as unhealthy).
      # 127.0.0.1, not localhost — see the note in docker-compose.yml.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
