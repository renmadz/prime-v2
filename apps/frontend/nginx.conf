server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (Coolify reverse proxy adds HTTPS-level headers;
    # these apply at the static file server layer)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback — all routes serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache TTL (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint for Coolify
    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Do not serve .env or hidden files
    location ~ /\. {
        deny all;
    }
}
